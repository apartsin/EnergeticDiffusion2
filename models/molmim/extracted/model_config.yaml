name: MolMIM-small
micro_batch_size: 2048
global_batch_size: 65536
tensor_model_parallel_size: 1
pipeline_model_parallel_size: 1
resume_from_checkpoint: null
pipeline_model_parallel_split_rank: 0
make_vocab_size_divisible_by: 128
pre_process: true
post_process: true
megatron_amp_O2: false
seq_length: 128
max_position_embeddings: 128
gradient_as_bucket_view: true
bias_gelu_fusion: true
share_token_embeddings: true
share_decoder_tokens_head_embeddings: false
hidden_size: 512
training_callbacks:
- class: bionemo.callbacks.scheduling_callbacks.ParameterMultiplicativeScheduler
  factor: 0.001
  min_multiplier: 0.0
  max_multiplier: 1.0
  module_parameter_path: enc_dec_model.enc_dec_model.hiddens_module.hidden_loss_transforms.0.loss_weight
hiddens:
  enc_output_name: z
  enc_inference_output_name: z_mean
  token_aggregation_method: mean
  hidden_aggregation_method: mean
  transform:
    q_z_given_x:
      cls_name: sampled_var_cond_gaussian
      hidden_size: 512
      min_logvar: -6.0
      max_logvar: 0.0
      map_var_to_hiddens: false
  loss:
    mim:
      cls_name: a_mim
      loss_weight: 1.0
tokenizer:
  library: regex
  type: null
  model: nemo:048c1f797f464dd5b6a90f60f9405827_molmim.model
  vocab_file: nemo:dd344353154640acbbaea1d4536fa7d0_molmim.vocab
  merge_file: null
data:
  links_file: /workspace/bionemo/examples/molecule/megamolbart/dataset/ZINC-downloader.txt
  dataset_path: /data/balanced_split
  dataset:
    train: x_OP_000..175_CL_
    test: x_OP_000..175_CL_
    val: x_OP_000..004_CL_
  canonicalize_target_smile: true
  canonicalize_encoder_input: true
  canonicalize_decoder_output: true
  encoder_augment: false
  decoder_independent_augment: false
  encoder_mask: false
  decoder_mask: false
  mask_prob: 0.0
  span_lambda: 3.0
  micro_batch_size: 2048
  num_workers: 10
  dataloader_type: single
  max_seq_length: 128
  seed: 42
  skip_lines: 0
  drop_last: false
  pin_memory: false
  data_impl: csv_mmap
  index_mapping_type: online
  data_impl_kwargs:
    csv_mmap:
      newline_int: 10
      header_lines: 1
      workers: 10
      sort_dataset_paths: true
      data_sep: ','
      data_col: 1
  use_upsampling: true
  index_mapping_dir: /results/data_index/
optim:
  name: fused_adam
  lr: 0.0005
  weight_decay: 0.001
  betas:
  - 0.9
  - 0.999
  sched:
    name: CosineAnnealing
    warmup_steps: 10000.0
    constant_steps: 50000.0
    max_steps: 1000000
    min_lr: 5.0e-05
dwnstr_task_validation:
  enabled: false
  dataset:
    class: bionemo.model.core.dwnstr_task_callbacks.SingleValuePredictionCallback
    task_type: regression
    infer_target: bionemo.model.molecule.molmim.infer.MolMIMInference
    max_seq_length: 128
    emb_batch_size: 128
    batch_size: 128
    num_epochs: 10
    shuffle: true
    num_workers: 8
    dataset_path: /data/physchem/
    task_name: SAMPL
    dataset:
      train: x000
      test: x000
    sequence_column: smiles
    target_column: expt
    random_seed: 1234
    optim:
      name: adam
      lr: 0.0001
      betas:
      - 0.9
      - 0.999
      eps: 1.0e-08
      weight_decay: 0.01
      sched:
        name: WarmupAnnealing
        min_lr: 1.0e-05
        last_epoch: -1
        warmup_ratio: 0.01
        max_steps: 1000
precision: 32
target: bionemo.model.molecule.molmim.molmim_model.MolMIMModel
nemo_version: 1.22.0
