# ─────────────────────────────────────────────────────────────────────────────
# LIMO v2.1: motif-augmented continuation.
# Uses labeled_motif_aug.csv (1.22 M rows) — rare motifs 5×, polynitro 2×.
# LR back to 3e-5 (v1 original). v1 weights as init.
# ─────────────────────────────────────────────────────────────────────────────

run:
  name:        "limo_ft_motif_rich_v2_1"
  seed:        43
  notes:       "v2.1: motif-augmented data + lr=3e-5 + v1 init"

paths:
  base:                "E:/Projects/EnergeticDiffusion2"
  limo_dir:            "external/LIMO"
  labeled_master:      "data/training/master/labeled_motif_aug.csv"
  unlabeled_master:    "data/training/master/labeled_motif_aug.csv"   # already merged
  cache_dir:           "data/training/vae_tokens_v2_1"
  experiments_dir:     "experiments"
  init_from:           "experiments/limo_ft_energetic_20260424T150825Z/checkpoints/best.pt"

data:
  subset:              "energetic_biased"
  augmented_source:    "data/training/master/labeled_motif_aug.csv"
  max_rows:            null
  train_frac:          0.95
  val_frac:            0.025
  test_frac:           0.025
  drop_oov:            true
  drop_too_long:       true

training:
  batch_size:          64
  grad_accum:          1
  epochs:              1
  total_time_minutes:  480
  optimizer:           "adamw"
  lr:                  3.0e-5
  weight_decay:        0.01
  betas:               [0.9, 0.98]
  grad_clip:           1.0
  warmup_steps:        500
  min_lr_ratio:        0.1
  kl:
    schedule:          "constant"
    beta:              0.01
    free_bits:         0.0
  precision:           "fp16"

log:
  keep_last_checkpoints:  3
  keep_best_checkpoints:  2
  ckpt_every_steps:       2000
  log_every_steps:        100
  val_every_steps:        1000
  jsonl_filename:         "train.jsonl"
  text_filename:          "train.log"

early_stop:
  enabled:             true
  patience_evals:      15
  min_delta:           1.0e-3

guards:
  nan_guard:
    enabled:           true
    max_consecutive:   3
