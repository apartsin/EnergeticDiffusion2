# LIMO v3.1: causal autoregressive transformer decoder + skip connection.
# Direct fix for v3 collapse onto pad/alkane baseline.

run:
  name:        "limo_v3_1_AR"
  seed:        45
  notes:       "v3.1: AR causal decoder + teacher forcing + skip from encoder embed"

paths:
  base:                "E:/Projects/EnergeticDiffusion2"
  limo_dir:            "external/LIMO"
  labeled_master:      "data/training/master/labeled_motif_aug.csv"
  unlabeled_master:    "data/training/master/labeled_motif_aug.csv"
  cache_dir:           "data/training/vae_tokens_v2_1"
  experiments_dir:     "experiments"
  init_from:           "experiments/limo_ft_energetic_20260424T150825Z/checkpoints/best.pt"

data:
  subset:              "energetic_biased"
  augmented_source:    "data/training/master/labeled_motif_aug.csv"
  max_rows:            null
  train_frac:          0.95
  val_frac:            0.025
  test_frac:           0.025
  drop_oov:            true
  drop_too_long:       true

arch:
  v3_1: true
  latent_dim:          1024
  embedding_dim:       64
  d_model:             384
  n_heads:             6
  n_layers:            4
  ff_mult:             4
  dropout:             0.1
  n_memory:            16
  freeze_encoder:      true
  skip_connection:     true

training:
  batch_size:          64
  grad_accum:          1
  epochs:              2
  total_time_minutes:  240
  optimizer:           "adamw"
  lr:                  3.0e-4
  weight_decay:        0.01
  betas:               [0.9, 0.98]
  grad_clip:           1.0
  warmup_steps:        1000
  min_lr_ratio:        0.1
  kl:
    schedule:          "constant"
    beta:              0.01
    free_bits:         0.0
  precision:           "fp16"

log:
  keep_last_checkpoints:  3
  keep_best_checkpoints:  2
  ckpt_every_steps:       2000
  log_every_steps:        100
  val_every_steps:        1000
  jsonl_filename:         "train.jsonl"
  text_filename:          "train.log"

early_stop:
  enabled:             true
  patience_evals:      15
  min_delta:           1.0e-3

guards:
  nan_guard:
    enabled:           true
    max_consecutive:   3
