# ─────────────────────────────────────────────────────────────────────────────
# Subset-conditional denoiser training config
# Targets RTX 2060 with ~30-60 min budget.
# ─────────────────────────────────────────────────────────────────────────────

run:
  name:        "diffusion_subset_cond"
  seed:        42
  notes:       "DDPM on LIMO latents, 4-prop embedding+mask conditioning"

paths:
  base:             "E:/Projects/EnergeticDiffusion2"
  experiments_dir:  "experiments"
  latents_pt:       "data/training/diffusion/latents.pt"

data:
  val_frac:         0.05
  # train = 1 - val_frac (test is not held out separately; use sampling eval)

model:
  hidden:           2048
  n_blocks:         8
  time_dim:         256
  prop_emb_dim:     64
  dropout:          0.0

training:
  batch_size:        128
  grad_accum:        1
  epochs:            10
  total_time_minutes: 45          # hard wall-clock cap
  optimizer:         "adamw"
  lr:                1.0e-4
  weight_decay:      1.0e-4
  betas:             [0.9, 0.98]
  grad_clip:         1.0
  warmup_steps:      500
  min_lr_ratio:      0.1

  # Diffusion
  T:                 1000
  ema_decay:         0.999

  # Subset sampling
  subset_size_probs:
    0: 0.15    # fully unconditional → trains CFG null branch
    1: 0.35
    2: 0.25
    3: 0.15
    4: 0.10

  # Additional unconditional-dropout rate on top (kicks mask to all-zeros)
  cfg_dropout_rate:  0.05

  precision:         "fp16"

log:
  keep_last_checkpoints:  3
  keep_best_checkpoints:  2
  ckpt_every_steps:       2000
  log_every_steps:        100
  val_every_steps:        500
  jsonl_filename:         "train.jsonl"
  text_filename:          "train.log"

early_stop:
  enabled:        true
  patience_evals: 8
  min_delta:      1.0e-4

guards:
  nan_guard:
    enabled:         true
    max_consecutive: 3
