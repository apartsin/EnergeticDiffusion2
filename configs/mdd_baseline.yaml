run:
  name: mdd_baseline_full
  output_root: experiments
  seed: 42
  device: cuda

data:
  diffusion_train: data/training/diffusion_pretrain/train.csv
  diffusion_validation: data/training/diffusion_pretrain/validation.csv
  diffusion_test: data/training/diffusion_pretrain/test.csv
  energetic_train: data/training/property_supervised_complete4/train.csv
  energetic_validation: data/training/property_supervised_complete4/validation.csv
  energetic_test: data/training/property_supervised_complete4/test.csv
  split_manifest: data/training/metadata/data_split_manifest.csv
  properties:
    - density
    - heat_of_formation
    - detonation_velocity
    - detonation_pressure
  subsets:
    vae_generic_train_max: 50000
    vae_energetic_train_max: 25000
    vae_generic_validation_max: 5000
    vae_energetic_validation_max: 3000
    latent_export_generic_max: 120000
    latent_export_energetic_max: 34000

vae:
  embedding_dim: 128
  hidden_dim: 256
  latent_dim: 128
  dropout: 0.1
  batch_size: 256
  epochs: 4
  lr: 0.0003
  beta_max: 0.1
  max_len_cap: 160
  num_workers: 0

predictor:
  ensemble_size: 3
  hidden_layer_sizes: [256, 128]
  max_iter: 220
  random_seed_start: 100

diffusion:
  timesteps: 200
  timestep_embed_dim: 32
  hidden_dim: 512
  batch_size: 256
  lr: 0.0002
  stage_a_steps: 1200
  stage_b_steps: 1200
  stage_c_steps: 800
  p_drop_all_properties: 0.15
  p_drop_each_property: 0.2
  p_drop_source: 0.3

generation:
  num_candidates: 500
  sampling_steps: 50
  guidance_scale: 2.5
  novelty_duplicate_threshold: 0.99
  top_k: 100

filtering:
  min_heavy_atoms: 5
  max_heavy_atoms: 80
  allowed_atoms: [C, H, N, O, F, Cl, Br, S]
  min_domain_score: 0.2

