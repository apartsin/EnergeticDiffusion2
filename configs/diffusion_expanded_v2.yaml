# ─────────────────────────────────────────────────────────────────────────────
# Expanded-conditioning denoiser v2.
# Improvements vs v1:
#   - cond_weight biases mask sampling: Tier-A/B selected over Tier-D
#   - 5× oversampling of property-extreme rows (top/bottom 10% of any prop)
#   - 0.30 property-dropout for sparse-conditioning robustness
#   - cfg_dropout 0.05 → 0.10 for stronger CFG learning
#   - 2× longer wall-clock budget
# ─────────────────────────────────────────────────────────────────────────────

run:
  name:  "diffusion_subset_cond_expanded_v2"
  seed:  42
  notes: "v2: weighted mask + extremes oversampling + prop-dropout"

paths:
  base:             "E:/Projects/EnergeticDiffusion2"
  experiments_dir:  "experiments"
  latents_pt:       "data/training/diffusion/latents_expanded.pt"

data:
  val_frac: 0.05

model:
  hidden:       2048
  n_blocks:     8
  time_dim:     256
  prop_emb_dim: 64
  dropout:      0.0

training:
  batch_size:         128
  grad_accum:         1
  epochs:             20
  total_time_minutes: 90
  optimizer:          "adamw"
  lr:                 1.0e-4
  weight_decay:       1.0e-4
  betas:              [0.9, 0.98]
  grad_clip:          1.0
  warmup_steps:       500
  min_lr_ratio:       0.1

  T:                  1000
  ema_decay:          0.999

  subset_size_probs:
    0: 0.10
    1: 0.25
    2: 0.30
    3: 0.20
    4: 0.15
  cfg_dropout_rate:        0.10
  precision:               "fp16"

  # NEW v2 knobs
  weighted_mask:                true   # Tier-A/B preferred when sampling subset
  property_dropout:             0.30   # zero each chosen mask entry indep.
  oversample_extremes_factor:   5.0    # rows at quantile extremes get 5× weight
  oversample_extremes_quantile: 0.10   # top/bottom 10% per property

log:
  keep_last_checkpoints:  3
  keep_best_checkpoints:  2
  ckpt_every_steps:       2000
  log_every_steps:        100
  val_every_steps:        500
  jsonl_filename:         "train.jsonl"
  text_filename:          "train.log"

early_stop:
  enabled:        true
  patience_evals: 12
  min_delta:      1.0e-4

guards:
  nan_guard:
    enabled:         true
    max_consecutive: 3
